[package]
name = "asv-router"
version = "0.1.0"
edition = "2021"
description = "Model-free intent routing with incremental learning. Sub-millisecond, no embeddings, no GPU."
license = "MIT OR Apache-2.0"
repository = "https://github.com/gladius/asv-router"
keywords = ["intent", "routing", "nlp", "chatbot", "sparse-vectors"]
categories = ["text-processing", "algorithms"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
aho-corasick = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = { version = "0.2", optional = true }
axum = { version = "0.8", optional = true }
tokio = { version = "1", features = ["full"], optional = true }
tower-http = { version = "0.6", features = ["cors"], optional = true }
reqwest = { version = "0.12", features = ["json"], optional = true }

[features]
default = []
wasm = ["wasm-bindgen"]
server = ["axum", "tokio", "tower-http", "reqwest"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[[bin]]
name = "benchmark"
path = "src/bin/benchmark.rs"

[[bin]]
name = "server"
path = "src/bin/server.rs"
required-features = ["server"]

[[bin]]
name = "reasoning_experiment"
path = "src/bin/reasoning_experiment.rs"

[[bin]]
name = "pmi_attention_sim"
path = "src/bin/pmi_attention_sim.rs"

[[bin]]
name = "pmi_residual_sim"
path = "src/bin/pmi_residual_sim.rs"

[[bin]]
name = "svd_attention"
path = "src/bin/svd_attention.rs"

[[bin]]
name = "neocortex_lm"
path = "src/bin/neocortex_lm.rs"

[[bin]]
name = "neocortex_lm2"
path = "src/bin/neocortex_lm2.rs"

[[bin]]
name = "neocortex_lm_rust"
path = "src/bin/neocortex_lm_rust.rs"

[[bin]]
name = "auto_discover_v5"
path = "src/bin/auto_discover_v5.rs"

[dev-dependencies]
