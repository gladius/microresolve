[package]
name = "asv-router"
version = "0.1.0"
edition = "2021"
description = "Model-free intent routing with incremental learning. Sub-millisecond, no embeddings, no GPU."
license = "MIT OR Apache-2.0"
repository = "https://github.com/gladius/asv-router"
keywords = ["intent", "routing", "nlp", "chatbot", "sparse-vectors"]
categories = ["text-processing", "algorithms"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = { version = "0.2", optional = true }

[features]
default = []
wasm = ["wasm-bindgen"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[[bin]]
name = "benchmark"
path = "src/bin/benchmark.rs"

[dev-dependencies]
