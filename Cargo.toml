[package]
name = "asv-router"
version = "0.1.0"
edition = "2021"
authors = ["Gladius Thayalarajan"]
description = "Sub-millisecond multilingual intent routing with LLM-assisted online learning. No embeddings, no GPU, no retraining."
license = "MIT OR Apache-2.0"
repository = "https://github.com/gladius/asv-router"
keywords = ["intent", "routing", "nlp", "chatbot", "sparse-vectors"]
categories = ["text-processing", "algorithms"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
aho-corasick = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
regex = "1"
thiserror = "1"
url = "2"
wasm-bindgen = { version = "0.2", optional = true }
axum = { version = "0.8", optional = true }
tokio = { version = "1", features = ["full"], optional = true }
tokio-stream = { version = "0.1", features = ["sync"], optional = true }
tower-http = { version = "0.6", features = ["cors", "fs"], optional = true }
reqwest = { version = "0.12", features = ["json", "blocking"] }

[features]
default = []
wasm = ["wasm-bindgen"]
server = ["axum", "tokio", "tokio-stream", "tower-http"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[[bin]]
name = "situation_exp"
path = "src/bin/situation_exp.rs"

[[bin]]
name = "situation_cjk_exp"
path = "src/bin/situation_cjk_exp.rs"

[[bin]]
name = "server"
path = "src/bin/server/main.rs"
required-features = ["server"]

[dev-dependencies]
