name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust — test / clippy / fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: clippy (server feature)
        run: cargo clippy --all-targets --features server -- -D warnings

      - name: test
        run: cargo test --all-features

      - name: build server binary
        run: cargo build --release --bin server --features server

  python:
    name: Python bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install maturin
        run: pip install maturin
      - name: build + install wheel
        working-directory: python
        run: |
          maturin build --release
          pip install target/wheels/*.whl
      - name: smoke test import
        run: python -c "import microresolve; r = microresolve.Router(); print('ok')"

  node:
    name: Node bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install deps
        working-directory: node
        run: npm ci || npm install
      - name: build
        working-directory: node
        run: npx napi build --release
      - name: smoke test require
        working-directory: node
        run: node -e "const m = require('./microresolve.node'); const r = new m.Router(); console.log('ok');"
