name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust — test / clippy / fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      # Build the Studio UI bundle so `bundled-ui` (rust-embed) finds
      # `ui/dist/` at compile time. Required by every downstream step
      # that touches the `server` feature: clippy, build, and HTTP tests.
      - name: build UI
        working-directory: ui
        run: |
          npm ci || npm install
          npm run build

      - uses: Swatinem/rust-cache@v2

      # Version-sync guard. Catches the failure mode that produced the v0.1.7
      # PyPI miss: pyproject.toml lagging Cargo.toml caused maturin to build
      # wheels with the wrong filename. Maturin now reads version dynamically
      # from Cargo.toml (so pyproject.toml has no `version` line to drift),
      # but Cargo.toml + the two binding Cargo.toml + node/package.json must
      # still stay in lockstep. Fail fast on drift.
      - name: version sync check
        run: |
          V=$(grep '^version = "' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "root version: $V"
          for f in python/Cargo.toml node/Cargo.toml; do
            grep -q "^version = \"$V\"" "$f" || { echo "::error::version drift in $f (expected $V)"; exit 1; }
          done
          grep -q "\"version\": \"$V\"" node/package.json || { echo "::error::version drift in node/package.json (expected $V)"; exit 1; }
          if grep -q '^version = ' python/pyproject.toml; then
            echo "::error::python/pyproject.toml has a static version line — should use dynamic = [\"version\"]"
            exit 1
          fi
          echo "all version sources agree on $V"

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: clippy (server feature)
        # Server-feature is an internal HTTP wrapper, not part of the embedded library.
        # Lints here are tracked but don't gate v0.1.0; will be tightened in v0.2.
        env:
          RUSTFLAGS: ""
        run: cargo clippy --all-targets --features server

      - name: lib unit tests
        run: cargo test --lib

      - name: build server binary
        run: cargo build --release --bin microresolve-studio --features server

      - name: HTTP integration tests (smoke + full E2E + auth)
        run: cargo test --release --test http_smoke --test http_full_e2e

      - name: connected example (live-sync loop)
        run: |
          # v0.1.9 requires X-Api-Key on every /api/* call (no more open
          # /api/auth/keys POST). On first boot the server auto-mints
          # mr_studio-admin_<hex> and writes it to <keys-dir>/admin-key.txt.
          # Use --keys-file to put admin-key.txt in a known location, then
          # cat it before running the example.
          mkdir -p /tmp/mr_ci_keys
          ./target/release/microresolve-studio \
            --port 3001 --no-browser \
            --data /tmp/mr_ci \
            --keys-file /tmp/mr_ci_keys/keys.json \
            > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          sleep 3
          test -f /tmp/mr_ci_keys/admin-key.txt || { echo "::error::bootstrap admin-key.txt not created"; cat /tmp/server.log; exit 1; }
          KEY=$(cat /tmp/mr_ci_keys/admin-key.txt)
          MICRORESOLVE_API_KEY="$KEY" cargo run --release --features connect --example connected
          kill $SERVER_PID 2>/dev/null || true

  python:
    name: Python bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install maturin
        run: pip install maturin
      - name: build + install wheel
        working-directory: python
        run: |
          maturin build --release
          pip install target/wheels/*.whl
      - name: smoke test import
        run: |
          python -c "
          import microresolve
          e = microresolve.MicroResolve()
          ns = e.namespace('test')
          ns.add_intent('greet', ['hello', 'hi there'])
          ns.add_intent('bye',   ['goodbye', 'see you'])
          assert ns.intent_count() == 2
          print('ok')
          "

  node:
    name: Node bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: install deps
        working-directory: node
        run: npm ci || npm install
      - name: build
        working-directory: node
        run: npm run build
      - name: smoke test require
        working-directory: node
        run: |
          node -e "
          const m = require('./');
          const e = new m.MicroResolve();
          const ns = e.namespace('test');
          ns.addIntent('greet', ['hello', 'hi there']);
          ns.addIntent('bye',   ['goodbye', 'see you']);
          if (ns.intentCount() !== 2) { console.error('intent_count != 2'); process.exit(1); }
          console.log('ok');
          "
