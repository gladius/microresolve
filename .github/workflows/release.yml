name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Stage 1: fast gate (~30s) ────────────────────────────────────────────────
  preflight:
    name: Preflight (dry-run publish check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: dry-run publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run

  # ── Stage 2: parallel builds + crate publish (gated on preflight) ────────────
  publish-crate:
    name: Publish crate to crates.io
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: publish (skip if already exists)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "microresolve") | .version')
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: microresolve-ci/1.0" \
            "https://crates.io/api/v1/crates/microresolve/$VERSION")
          if [ "$HTTP" = "200" ]; then
            echo "microresolve $VERSION already published on crates.io — skipping"
          else
            cargo publish --no-verify
          fi

  build-python-wheels:
    name: Build Python wheel (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: python/dist/*.whl

  build-node-binaries:
    name: Build Node binary (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            # musl-tools from apt is sufficient for x86_64-musl; no container needed
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      # Debian cross-compiler for musl — provides musl-gcc.
      - name: install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      # Debian cross-compiler for aarch64 — complete toolchain with all C headers.
      - name: install aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update -q && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: install deps
        working-directory: node
        run: npm ci || npm install

      - name: build
        working-directory: node
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: node/*.node

  build-server-binaries:
    name: Build server binary (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            strip: strip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            strip: strip
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            strip: aarch64-linux-gnu-strip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            strip: strip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            strip: strip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            strip: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: server-${{ matrix.target }}

      - name: install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      - name: install aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update -q && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: build UI
        run: cd ui && npm ci && npm run build

      - name: build
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: cargo build --release --features server --bin microresolve-studio --target ${{ matrix.target }}

      - name: strip binary
        if: matrix.strip != ''
        run: ${{ matrix.strip }} target/${{ matrix.target }}/release/microresolve-studio

      - name: package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir _pkg
          cp target/${{ matrix.target }}/release/microresolve-studio _pkg/microresolve-studio
          cp LICENSE-MIT LICENSE-APACHE README.md _pkg/
          tar -czf microresolve-studio-${{ matrix.target }}.tar.gz -C _pkg .

      - name: package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\microresolve-studio.exe" "microresolve-studio.exe"
          $files = @("microresolve-studio.exe", "LICENSE-MIT", "LICENSE-APACHE", "README.md")
          Compress-Archive -Path $files -DestinationPath "microresolve-studio-${{ matrix.target }}.zip"

      - name: attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            target/${{ matrix.target }}/release/microresolve-studio${{ matrix.archive == 'zip' && '.exe' || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.target }}
          path: microresolve-studio-${{ matrix.target }}.${{ matrix.archive }}

  # ── Stage 3: publish (gated on builds) ──────────────────────────────────────
  publish-pypi:
    name: Publish wheels to PyPI
    needs: build-python-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - name: publish
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: build-node-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: install deps
        working-directory: node
        run: npm ci || npm install
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: node/artifacts
          merge-multiple: true
      - name: create npm platform dirs
        working-directory: node
        run: npx napi create-npm-dirs --npm-dir npm
      - name: distribute artifacts into npm sub-packages
        working-directory: node
        run: npx napi artifacts --output-dir artifacts --npm-dir npm
      - name: publish (skip if already exists)
        working-directory: node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "microresolve@${VERSION}" version 2>/dev/null; then
            echo "microresolve ${VERSION} already on npm — skipping"
          else
            npx napi prepublish --no-gh-release
            npm publish --access public
          fi

  # ── Stage 3b: Build pack tarballs (parallel with publishing) ─────────────────
  build-pack-tarballs:
    name: Build reference pack tarballs
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build pack tarballs
        run: |
          VERSION="${GITHUB_REF_NAME}"  # e.g. v0.2.1
          mkdir -p target/pack-tarballs
          for PACK in safety-filter eu-ai-act-prohibited hipaa-triage mcp-tools-generic; do
            tar czf "target/pack-tarballs/pack-${PACK}-${VERSION}.tar.gz" -C packs "${PACK}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: pack-tarballs
          path: target/pack-tarballs/*.tar.gz

  # ── Stage 4: GitHub release (only after all 3 registries succeed) ────────────
  github-release:
    name: Create GitHub release
    needs: [publish-crate, publish-pypi, publish-npm, build-server-binaries, build-pack-tarballs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: server-archives
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: pack-tarballs
          path: pack-tarballs
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
          fail_on_unmatched_files: false
          files: |
            server-archives/*
            pack-tarballs/*
