name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Stage 1: fast gate (~30s) ────────────────────────────────────────────────
  preflight:
    name: Preflight (dry-run publish check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: dry-run publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run

  # ── Stage 2: parallel builds + crate publish (gated on preflight) ────────────
  publish-crate:
    name: Publish crate to crates.io
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: publish (skip if already exists)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "microresolve") | .version')
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/microresolve/$VERSION")
          if [ "$HTTP" = "200" ]; then
            echo "microresolve $VERSION already published on crates.io — skipping"
          else
            cargo publish --no-verify
          fi

  build-python-wheels:
    name: Build Python wheel (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: python/dist/*.whl

  build-node-binaries:
    name: Build Node binary (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            # musl-tools from apt is sufficient for x86_64-musl; no container needed
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # napi-rs container provides aarch64 cross-gcc; Rust is updated via dtolnay below
            container: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      # Runs on all rows including the aarch64 container — upgrades the container's
      # bundled Rust 1.82 to current stable so edition2024 deps resolve correctly.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Only needed on bare runners — container rows have Node already.
      - uses: actions/setup-node@v4
        if: ${{ !matrix.container }}
        with:
          node-version: "20"

      # musl-tools provides musl-gcc for the x86_64-musl target on bare ubuntu.
      - name: install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

      - name: install deps
        working-directory: node
        run: npm ci || npm install

      - name: build
        working-directory: node
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: node/*.node

  # ── Stage 3: publish (gated on builds) ──────────────────────────────────────
  publish-pypi:
    name: Publish wheels to PyPI
    needs: build-python-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - name: publish
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: build-node-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: install deps
        working-directory: node
        run: npm ci || npm install
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: node/artifacts
          merge-multiple: true
      - name: distribute artifacts into npm sub-packages
        working-directory: node
        run: npx napi artifacts --output-dir artifacts --npm-dir npm
      - name: prepublish (write optionalDependencies + copy binaries)
        working-directory: node
        run: npx napi prepublish --no-gh-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: publish main package
        working-directory: node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Stage 4: GitHub release (only after all 3 registries succeed) ────────────
  github-release:
    name: Create GitHub release
    needs: [publish-crate, publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
          fail_on_unmatched_files: false
