name: Feature request
description: Suggest a capability, API, or integration.
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Explain the **use case** first. The implementation approach can follow — but the "why" is what decides whether it fits MicroResolve's scope.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this has not been suggested.
          required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What are you trying to do? What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API or behaviour change would address the use case? Pseudocode or an example call is helpful.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or rejected, and why.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How critical is this for your use case?
      options:
        - Nice to have
        - Workaround exists but clunky
        - Blocking — can't use MicroResolve without this
    validations:
      required: true
