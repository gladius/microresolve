<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASV Router — Live Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #f5f5f7;
  --surface2: #ebebef;
  --border: #d1d5db;
  --text: #1f2937;
  --text-muted: #6b7280;
  --accent: #7c3aed;
  --accent-dim: #a78bfa;
  --green: #16a34a;
  --amber: #b45309;
  --red: #dc2626;
  --blue: #2563eb;
  --font: system-ui, -apple-system, sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 16px;
  flex-shrink: 0;
}

header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
}

header .subtitle {
  font-size: 13px;
  color: var(--text-muted);
}

main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Left panel — intents */
.panel-left {
  width: 340px;
  min-width: 340px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-left-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.panel-left-header h2 {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}

.intents-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.intent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 6px;
}

.intent-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.intent-name {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--green);
}

.intent-remove {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 2px 4px;
}
.intent-remove:hover { color: var(--red); }

.seed-list {
  list-style: none;
}

.seed-item {
  font-size: 13px;
  color: var(--text-muted);
  padding: 1px 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.seed-item::before {
  content: '"';
  color: var(--text-muted);
}
.seed-item::after {
  content: '"';
  color: var(--text-muted);
}

.intent-meta {
  font-size: 12px;
  color: var(--accent-dim);
  margin-top: 4px;
}

.add-seed-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-size: 13px;
  padding: 4px 6px;
  margin-top: 4px;
  outline: none;
}
.add-seed-input:focus { border-color: var(--accent); }
.add-seed-input::placeholder { color: var(--text-muted); }

.add-seed-btn {
  font-size: 12px;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 0;
  margin-top: 2px;
}
.add-seed-btn:hover { text-decoration: underline; }

.panel-left-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.stats {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
}

.btn {
  display: block;
  width: 100%;
  padding: 8px;
  margin-bottom: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  text-align: center;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }

/* Right panel — chat */
.panel-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.msg {
  margin-bottom: 16px;
}

.msg-query {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  margin-bottom: 6px;
}
.msg-query::before {
  content: '> ';
  color: var(--accent);
}

.msg-results {
  padding-left: 20px;
}

.msg-result-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-family: var(--mono);
  font-size: 13px;
  padding: 2px 0;
}

.result-rank { color: var(--text-muted); width: 16px; text-align: right; }
.result-id { color: var(--green); min-width: 160px; }
.result-id.top { color: var(--green); font-weight: 600; }
.result-id.other { color: var(--text-muted); }
.result-score { color: var(--amber); min-width: 50px; text-align: right; }
.result-latency { color: var(--text-muted); font-size: 12px; }

.msg-multi {
  padding-left: 20px;
}

.msg-multi-header {
  font-size: 13px;
  color: var(--blue);
  margin-bottom: 4px;
}

.msg-multi-intent {
  font-family: var(--mono);
  font-size: 13px;
  padding: 1px 0;
  color: var(--text);
}
.msg-multi-intent .mi-id { color: var(--green); }
.msg-multi-intent .mi-span { color: var(--text-muted); }
.msg-multi-intent .mi-score { color: var(--amber); }

.msg-relation {
  font-size: 13px;
  color: var(--accent);
  padding: 2px 0;
}

.msg-system {
  font-size: 13px;
  color: var(--text-muted);
  padding-left: 20px;
}

.msg-learn {
  font-size: 13px;
  color: var(--green);
  padding-left: 20px;
}

.msg-error {
  font-size: 13px;
  color: var(--red);
  padding-left: 20px;
}

.msg-help {
  font-size: 13px;
  color: var(--text-muted);
  padding-left: 20px;
  line-height: 1.6;
}
.msg-help code {
  color: var(--accent);
  font-family: var(--mono);
}

.chat-input-area {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#chat-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
}
#chat-input:focus { border-color: var(--accent); }
#chat-input::placeholder { color: var(--text-muted); }

/* New intent modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal-overlay.hidden { display: none; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  width: 380px;
}
.modal h3 {
  font-size: 15px;
  margin-bottom: 12px;
  color: var(--text);
}
.modal label {
  display: block;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.modal input, .modal textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 8px;
  margin-bottom: 12px;
  outline: none;
}
.modal input:focus, .modal textarea:focus { border-color: var(--accent); }
.modal textarea { height: 100px; resize: vertical; }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.modal-actions button {
  padding: 6px 16px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid var(--border);
}
.modal-actions .btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.modal-actions .btn-cancel {
  background: var(--surface2);
  color: var(--text);
}

/* Generate button */
.btn-generate {
  display: block;
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 4px;
  color: var(--accent);
  font-size: 13px;
  cursor: pointer;
  text-align: center;
}
.btn-generate:hover { background: var(--accent); color: #fff; }
.btn-generate:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: var(--surface2);
  color: var(--text-muted);
  border-color: var(--border);
}
.generate-status {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  min-height: 16px;
}

/* Language checkbox grid */
.lang-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 2px 12px;
  margin-bottom: 12px;
}
.lang-grid label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  padding: 3px 0;
  margin-bottom: 0;
}
.lang-grid input[type="checkbox"] {
  width: auto;
  margin: 0;
  padding: 0;
  accent-color: var(--accent);
}

/* Language panels in modal */
.lang-panels-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  max-height: 200px;
  overflow-y: auto;
}
.lang-panel {
  flex: 1;
  min-width: 120px;
}
.lang-panel-header {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  padding: 4px 6px;
  background: var(--surface2);
  border-radius: 3px;
}
.lang-panel textarea {
  width: 100%;
  height: 100px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px;
  resize: vertical;
  outline: none;
}
.lang-panel textarea:focus { border-color: var(--accent); }

/* Language badges on intent cards */
.lang-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  margin-right: 3px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.seed-lang-group {
  margin-bottom: 4px;
}
.seed-lang-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-dim);
  margin-top: 4px;
  margin-bottom: 1px;
}

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-size: 16px;
  color: var(--text-muted);
}
</style>
</head>
<body>

<div class="loading" id="loading">Loading ASV Router (WASM)...</div>

<div class="app" id="app" style="display:none">
  <header>
    <h1>ASV Router</h1>
    <span class="subtitle">Model-free intent routing — sub-millisecond — zero infrastructure — runs in your browser via WASM</span>
  </header>

  <main>
    <aside class="panel-left">
      <div class="panel-left-header">
        <h2>Intents</h2>
      </div>
      <div class="intents-list" id="intents-list"></div>
      <div class="panel-left-footer">
        <button class="btn" id="add-intent-btn">+ New Intent</button>
        <button class="btn" id="reset-btn">Reset Demo</button>
        <div class="stats" id="stats"></div>
      </div>
    </aside>

    <section class="panel-right">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder='Type a query... or /help for commands' autofocus />
      </div>
    </section>
  </main>
</div>

<!-- New intent modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal" style="width: 700px; max-width: 90vw;">
    <h3>New Intent</h3>
    <label for="modal-id">Intent ID</label>
    <input type="text" id="modal-id" placeholder="e.g. cancel_order" />
    <label for="modal-desc">Description (for AI seed generation)</label>
    <input type="text" id="modal-desc" placeholder="e.g. Customer wants to cancel their subscription" />
    <label>Languages</label>
    <div class="lang-grid" id="lang-grid"></div>
    <button class="btn-generate" id="modal-generate">Generate Seeds with AI</button>
    <div class="generate-status" id="generate-status"></div>
    <div class="lang-panels-row" id="lang-panels"></div>
    <textarea id="modal-seeds" style="display:none"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-add">Add Intent</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script type="module">
import init, { WasmRouter } from './pkg/asv_router.js';

let router;

const DEFAULT_INTENTS = [
  { id: 'cancel_order', seeds: [
    'cancel my order',
    'I need to cancel an order I just placed',
    'please stop my order from shipping',
    'I changed my mind and want to cancel the purchase',
    'how do I cancel something I ordered yesterday',
    'cancel order number',
    'I accidentally ordered the wrong thing, cancel it',
    'withdraw my order before it ships',
  ]},
  { id: 'track_order', seeds: [
    'where is my package',
    'track my order',
    'my order still hasn\'t arrived and it\'s been a week',
    'I need a shipping update on my recent purchase',
    'when will my delivery arrive',
    'package tracking number',
    'it says delivered but I never got it',
    'how long until my order gets here',
  ]},
  { id: 'refund', seeds: [
    'I want a refund',
    'get my money back',
    'I received a damaged item and need a refund',
    'the product was nothing like the description, refund please',
    'how long does it take to process a return',
    'I returned it two weeks ago and still no refund',
    'I want to return this for a full refund',
    'money back',
  ]},
  { id: 'contact_human', seeds: [
    'talk to a human',
    'I need to speak with a real person not a bot',
    'connect me to customer service please',
    'this bot is useless, get me an agent',
    'transfer me to a representative',
    'I want to talk to someone who can actually help',
    'live agent please',
    'escalate this to a manager',
  ]},
  { id: 'reset_password', seeds: [
    'reset my password',
    'I forgot my password and can\'t log in',
    'my account is locked out',
    'how do I change my password',
    'the password reset email never arrived',
    'I keep getting invalid password error',
    'locked out of my account need help getting back in',
    'send me a password reset link',
  ]},
  { id: 'check_balance', seeds: [
    'check my balance',
    'how much money is in my account',
    'what\'s my current account balance',
    'show me my available funds',
    'I need to know how much I have left',
    'account summary',
    'remaining balance on my card',
    'what do I owe right now',
  ]},
  { id: 'update_address', seeds: [
    'change my address',
    'I moved and need to update my shipping address',
    'update my delivery address before it ships',
    'my address is wrong on the order',
    'change the shipping destination',
    'I need to correct my mailing address',
    'ship it to a different address instead',
    'new address for future orders',
  ]},
  { id: 'billing_issue', seeds: [
    'wrong charge on my account',
    'I was charged twice for the same order',
    'there\'s a billing error on my statement',
    'I see an unauthorized charge',
    'you overcharged me by twenty dollars',
    'my credit card was charged the wrong amount',
    'dispute a charge',
    'the amount on my bill doesn\'t match what I ordered',
  ]},
];

async function main() {
  await init();
  router = new WasmRouter();

  // Load supported languages from Rust and build UI
  langNames = JSON.parse(router.get_languages());
  buildLangGrid();

  loadDefaults();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  addSystemMessage('ASV Router loaded. ' + router.intent_count() + ' intents, running 100% in your browser via WebAssembly.');
  addSystemMessage('Type any query to route it. Type <code>/help</code> for commands.');

  refreshIntents();
  document.getElementById('chat-input').focus();
}

function loadDefaults() {
  for (const intent of DEFAULT_INTENTS) {
    router.add_intent(intent.id, JSON.stringify(intent.seeds));
  }
}

// ---- Chat ----
const chatEl = document.getElementById('chat-messages');
const inputEl = document.getElementById('chat-input');

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const val = inputEl.value.trim();
    if (!val) return;
    inputEl.value = '';
    handleInput(val);
  }
});

function handleInput(raw) {
  if (raw === '/help') {
    addQueryMessage(raw);
    showHelp();
    return;
  }

  if (raw === '/reset') {
    addQueryMessage(raw);
    router = new WasmRouter();
    loadDefaults();
    refreshIntents();
    addLearnMessage('Router reset to defaults. ' + router.intent_count() + ' intents loaded.');
    return;
  }

  // /learn <query> -> <intent>
  const learnMatch = raw.match(/^\/learn\s+(.+?)\s*(?:->|→)\s*(\S+)$/i);
  if (learnMatch) {
    const [, query, intent] = learnMatch;
    addQueryMessage(raw);
    router.learn(query, intent);
    refreshIntents();
    addLearnMessage('Learned: "' + query + '" → ' + intent);
    return;
  }

  // /correct <query> -> <wrong> -> <right>
  const correctMatch = raw.match(/^\/correct\s+(.+?)\s*(?:->|→)\s*(\S+)\s*(?:->|→)\s*(\S+)$/i);
  if (correctMatch) {
    const [, query, wrong, right] = correctMatch;
    addQueryMessage(raw);
    router.correct(query, wrong, right);
    refreshIntents();
    addLearnMessage('Corrected: "' + query + '" moved from ' + wrong + ' → ' + right);
    return;
  }

  // /multi <query>
  const multiMatch = raw.match(/^\/multi\s+(.+)$/i);
  if (multiMatch) {
    const query = multiMatch[1];
    addQueryMessage(raw);
    runMulti(query);
    return;
  }

  // Regular query — auto-detect multi if "and"/"but"/"then"/"or" present with enough words
  addQueryMessage(raw);
  if (/\b(and|but|then|or)\b/i.test(raw) && raw.split(/\s+/).length > 5) {
    runMulti(raw);
  } else {
    runRoute(raw);
  }
}

function runRoute(query) {
  const t0 = performance.now();
  const json = router.route(query);
  const elapsed = performance.now() - t0;
  const results = JSON.parse(json);

  if (results.length === 0) {
    addSystemMessage('No match found.');
    return;
  }

  const div = document.createElement('div');
  div.className = 'msg-results';

  const top5 = results.slice(0, 5);
  top5.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'msg-result-row';
    row.innerHTML =
      '<span class="result-rank">' + (i === 0 ? '→' : '') + '</span>' +
      '<span class="result-id ' + (i === 0 ? 'top' : 'other') + '">' + r.id + '</span>' +
      '<span class="result-score">' + r.score.toFixed(2) + '</span>' +
      (i === 0 ? '<span class="result-latency">' + elapsed.toFixed(0) + 'μs</span>' : '');
    div.appendChild(row);
  });

  chatEl.appendChild(div);
  scrollChat();
}

function runMulti(query) {
  const t0 = performance.now();
  const json = router.route_multi(query, 0.3);
  const elapsed = performance.now() - t0;
  const output = JSON.parse(json);

  if (output.intents.length === 0) {
    addSystemMessage('No intents detected.');
    return;
  }

  const div = document.createElement('div');
  div.className = 'msg-multi';

  const header = document.createElement('div');
  header.className = 'msg-multi-header';
  header.textContent = 'Multi-intent: ' + output.intents.length + ' detected (' + elapsed.toFixed(0) + 'μs)';
  div.appendChild(header);

  output.intents.forEach((intent, i) => {
    const row = document.createElement('div');
    row.className = 'msg-multi-intent';
    const prefix = i < output.intents.length - 1 ? '├─' : '└─';
    row.innerHTML = prefix +
      ' <span class="mi-id">' + intent.id + '</span>' +
      ' <span class="mi-score">' + intent.score.toFixed(2) + '</span>' +
      ' <span class="mi-span">span [' + intent.span[0] + ',' + intent.span[1] + ']</span>';
    div.appendChild(row);
  });

  output.relations.forEach((rel) => {
    const row = document.createElement('div');
    row.className = 'msg-relation';
    row.textContent = '   Relation: ' + rel.type;
    div.appendChild(row);
  });

  chatEl.appendChild(div);
  scrollChat();
}

function addQueryMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg';
  const q = document.createElement('div');
  q.className = 'msg-query';
  q.textContent = text;
  div.appendChild(q);
  chatEl.appendChild(div);
  scrollChat();
}

function addSystemMessage(html) {
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.innerHTML = html;
  chatEl.appendChild(div);
  scrollChat();
}

function addLearnMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg-learn';
  div.textContent = text;
  chatEl.appendChild(div);
  scrollChat();
}

function addErrorMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg-error';
  div.textContent = text;
  chatEl.appendChild(div);
  scrollChat();
}

function showHelp() {
  const div = document.createElement('div');
  div.className = 'msg-help';
  div.innerHTML =
    '<strong>Commands:</strong><br>' +
    '<code>any text</code> — route query (auto-detects multi-intent)<br>' +
    '<code>/multi &lt;query&gt;</code> — force multi-intent decomposition<br>' +
    '<code>/learn &lt;query&gt; -&gt; &lt;intent&gt;</code> — teach the router<br>' +
    '<code>/correct &lt;query&gt; -&gt; &lt;wrong&gt; -&gt; &lt;right&gt;</code> — fix misroute<br>' +
    '<code>/reset</code> — reset to default demo intents<br>' +
    '<code>/help</code> — show this message<br>' +
    '<br><strong>Try these:</strong><br>' +
    '<code>I need to cancel something</code><br>' +
    '<code>cancel my order and track the package</code><br>' +
    '<code>stop charging me</code> (no match → then /learn it)<br>' +
    '<code>don\'t cancel my order</code> (negation-aware)';
  chatEl.appendChild(div);
  scrollChat();
}

function scrollChat() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

// ---- Left panel ----
function refreshIntents() {
  const json = router.get_intents_json();
  const intents = JSON.parse(json);
  const list = document.getElementById('intents-list');
  list.innerHTML = '';

  for (const intent of intents) {
    const card = document.createElement('div');
    card.className = 'intent-card';

    const header = document.createElement('div');
    header.className = 'intent-card-header';
    const name = document.createElement('span');
    name.className = 'intent-name';
    name.textContent = intent.id;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'intent-remove';
    removeBtn.textContent = '×';
    removeBtn.title = 'Remove intent';
    removeBtn.onclick = () => {
      router.remove_intent(intent.id);
      refreshIntents();
    };
    header.appendChild(name);
    header.appendChild(removeBtn);
    card.appendChild(header);

    const byLang = intent.seeds_by_lang || {};
    const langKeys = Object.keys(byLang).filter(k => k !== '_learned');
    const isMultiLang = langKeys.length > 1;

    // Always show language badges
    if (langKeys.length > 0) {
      const badgeRow = document.createElement('div');
      badgeRow.style.marginBottom = '4px';
      for (const lang of langKeys) {
        const badge = document.createElement('span');
        badge.className = 'lang-badge';
        badge.textContent = lang.toUpperCase();
        badge.title = (byLang[lang] || []).length + ' seeds';
        badgeRow.appendChild(badge);
      }
      // Show learned badge if present
      if (byLang['_learned'] && byLang['_learned'].length > 0) {
        const badge = document.createElement('span');
        badge.className = 'lang-badge';
        badge.style.color = 'var(--green)';
        badge.style.borderColor = 'var(--green)';
        badge.textContent = '+' + byLang['_learned'].length + ' learned';
        badgeRow.appendChild(badge);
      }
      card.appendChild(badgeRow);
    }

    const seeds = document.createElement('ul');
    seeds.className = 'seed-list';

    // Always show seeds grouped by language
    let shown = 0;
    const maxShow = isMultiLang ? 6 : 3;
    const seedsPerLang = isMultiLang ? 2 : 3;
    for (const lang of langKeys) {
      if (shown >= maxShow) break;
      const langSeeds = byLang[lang] || [];
      if (isMultiLang) {
        const label = document.createElement('div');
        label.className = 'seed-lang-label';
        label.textContent = lang.toUpperCase();
        seeds.appendChild(label);
      }
      for (const s of langSeeds.slice(0, seedsPerLang)) {
        if (shown >= maxShow) break;
        const li = document.createElement('li');
        li.className = 'seed-item';
        li.textContent = s;
        seeds.appendChild(li);
        shown++;
      }
    }
    const total = langKeys.reduce((sum, k) => sum + (byLang[k] || []).length, 0);
    if (total > shown) {
      const li = document.createElement('li');
      li.className = 'seed-item';
      li.style.color = 'var(--text-muted)';
      li.textContent = '... +' + (total - shown) + ' more';
      seeds.appendChild(li);
    }
    card.appendChild(seeds);

    if (intent.learned_count > 0) {
      const learnedInfo = document.createElement('div');
      learnedInfo.className = 'intent-meta';
      learnedInfo.textContent = '+' + intent.learned_count + ' learned terms';
      card.appendChild(learnedInfo);
    }

    // Add seed inline
    const addBtn = document.createElement('button');
    addBtn.className = 'add-seed-btn';
    addBtn.textContent = '+ add seed';
    addBtn.onclick = () => {
      addBtn.style.display = 'none';
      const input = document.createElement('input');
      input.className = 'add-seed-input';
      input.placeholder = 'Type seed phrase, press Enter';
      input.onkeydown = (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
          router.add_seed(intent.id, input.value.trim());
          refreshIntents();
        }
        if (e.key === 'Escape') {
          input.remove();
          addBtn.style.display = '';
        }
      };
      card.appendChild(input);
      input.focus();
    };
    card.appendChild(addBtn);

    list.appendChild(card);
  }

  // Stats
  const stats = document.getElementById('stats');
  stats.textContent = intents.length + ' intents';
}

// ---- Modal ----
const modal = document.getElementById('modal');
// Loaded from Rust via WASM — single source of truth
let langNames = {};

function buildLangGrid() {
  const grid = document.getElementById('lang-grid');
  grid.innerHTML = '';
  const codes = Object.keys(langNames).sort((a, b) => {
    if (a === 'en') return -1;
    if (b === 'en') return 1;
    return langNames[a].localeCompare(langNames[b]);
  });
  for (const code of codes) {
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = code;
    if (code === 'en') cb.checked = true;
    cb.addEventListener('change', buildLangPanels);
    label.appendChild(cb);
    label.appendChild(document.createTextNode(' ' + langNames[code]));
    grid.appendChild(label);
  }
}

function getSelectedLangs() {
  return Array.from(document.querySelectorAll('#lang-grid input:checked')).map(cb => cb.value);
}

// Build language panels based on checked languages
function buildLangPanels() {
  const langs = getSelectedLangs();
  const panelsEl = document.getElementById('lang-panels');
  // Preserve existing panel content
  const existing = {};
  panelsEl.querySelectorAll('textarea').forEach(ta => {
    existing[ta.dataset.lang] = ta.value;
  });
  panelsEl.innerHTML = '';

  if (langs.length === 0) return;

  for (const lang of langs) {
    const panel = document.createElement('div');
    panel.className = 'lang-panel';
    const header = document.createElement('div');
    header.className = 'lang-panel-header';
    header.textContent = langNames[lang] || lang;
    const ta = document.createElement('textarea');
    ta.dataset.lang = lang;
    ta.placeholder = 'Seeds for ' + (langNames[lang] || lang) + '...';
    ta.value = existing[lang] || '';
    ta.addEventListener('input', syncLangPanels);
    panel.appendChild(header);
    panel.appendChild(ta);
    panelsEl.appendChild(panel);
  }
  syncLangPanels();
}

// Checkbox change listeners are attached dynamically in buildLangGrid()

document.getElementById('add-intent-btn').onclick = () => {
  modal.classList.remove('hidden');
  document.getElementById('modal-id').value = '';
  document.getElementById('modal-desc').value = '';
  document.getElementById('modal-seeds').value = '';
  // Reset checkboxes: only English checked
  document.querySelectorAll('#lang-grid input').forEach(cb => { cb.checked = cb.value === 'en'; });
  document.getElementById('generate-status').textContent = '';
  buildLangPanels();
  document.getElementById('modal-id').focus();
};
document.getElementById('modal-cancel').onclick = () => modal.classList.add('hidden');
document.getElementById('modal-add').onclick = () => {
  const id = document.getElementById('modal-id').value.trim();
  if (!id) return;

  // Collect seeds from language panels
  const seedsByLang = {};
  document.querySelectorAll('#lang-panels textarea').forEach(ta => {
    const lang = ta.dataset.lang;
    const langSeeds = ta.value.split('\n').map(s => s.trim()).filter(Boolean);
    if (langSeeds.length > 0) seedsByLang[lang] = langSeeds;
  });

  const total = Object.values(seedsByLang).reduce((sum, arr) => sum + arr.length, 0);
  if (total === 0) return;

  router.add_intent_multilingual(id, JSON.stringify(seedsByLang));
  const langCount = Object.keys(seedsByLang).length;
  modal.classList.add('hidden');
  refreshIntents();
  addLearnMessage('Added intent: ' + id + ' with ' + total + ' seeds in ' + langCount + ' language(s)');
};
modal.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };

// ---- AI Seed Generation ----
const generateBtn = document.getElementById('modal-generate');
const generateStatus = document.getElementById('generate-status');

function getApiKey() {
  return (window.ASV_CONFIG && window.ASV_CONFIG.apiKey) || '';
}

generateBtn.onclick = async () => {
  const apiKey = getApiKey();
  if (!apiKey) {
    generateStatus.style.color = 'var(--red)';
    generateStatus.textContent = 'API key not configured. Set ANTHROPIC_API_KEY env and rebuild.';
    return;
  }

  const intentId = document.getElementById('modal-id').value.trim();
  const description = document.getElementById('modal-desc').value.trim();
  if (!description) {
    generateStatus.style.color = 'var(--red)';
    generateStatus.textContent = 'Enter a description first';
    return;
  }

  const languages = getSelectedLangs();
  if (languages.length === 0) {
    generateStatus.style.color = 'var(--red)';
    generateStatus.textContent = 'Select at least one language';
    return;
  }

  generateBtn.disabled = true;
  generateStatus.style.color = 'var(--text-muted)';
  generateStatus.textContent = 'Generating diverse seeds via Claude Haiku...';

  try {
    // Rust builds the prompt
    const langsJson = JSON.stringify(languages);
    const prompt = router.build_seed_prompt(intentId, description, langsJson);

    // JS only does HTTP transport
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2048,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${resp.status}`);
    }

    const data = await resp.json();
    const text = data.content[0].text.trim();

    // Rust parses the response
    const parsed = JSON.parse(router.parse_seed_response(text, langsJson));
    if (parsed.error) throw new Error(parsed.error);

    const { seeds_by_lang, total } = parsed;

    // Populate language panels
    for (const lang of languages) {
      const langSeeds = seeds_by_lang[lang] || [];
      const ta = document.querySelector(`#lang-panels textarea[data-lang="${lang}"]`);
      if (ta) {
        const prev = ta.value.trim();
        ta.value = prev ? prev + '\n' + langSeeds.join('\n') : langSeeds.join('\n');
      }
    }

    // Update panel headers with counts
    document.querySelectorAll('#lang-panels .lang-panel').forEach(panel => {
      const ta = panel.querySelector('textarea');
      const header = panel.querySelector('.lang-panel-header');
      const count = ta.value.split('\n').filter(s => s.trim()).length;
      const lang = ta.dataset.lang;
      header.textContent = (langNames[lang] || lang) + ' (' + count + ')';
    });

    syncLangPanels();

    const multiLang = languages.length > 1;
    generateStatus.style.color = 'var(--green)';
    generateStatus.textContent = `Generated ${total} seeds` + (multiLang ? ` across ${languages.length} languages` : '');
  } catch (e) {
    generateStatus.style.color = 'var(--red)';
    generateStatus.textContent = 'Error: ' + e.message;
  } finally {
    generateBtn.disabled = false;
  }
};

// Sync language panel edits back to main textarea
function syncLangPanels() {
  const panels = document.querySelectorAll('#lang-panels textarea');
  const all = [];
  panels.forEach(ta => {
    ta.value.split('\n').map(s => s.trim()).filter(Boolean).forEach(s => all.push(s));
  });
  document.getElementById('modal-seeds').value = all.join('\n');
}

// ---- Reset ----
document.getElementById('reset-btn').onclick = () => {
  router = new WasmRouter();
  loadDefaults();
  refreshIntents();
  chatEl.innerHTML = '';
  addSystemMessage('Router reset. ' + router.intent_count() + ' intents loaded.');
};

main().catch(e => {
  document.getElementById('loading').textContent = 'Failed to load WASM: ' + e.message;
  console.error(e);
});
</script>
