[package]
name = "microresolve-node"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi8"] }
napi-derive = "3"
microresolve-core = { package = "microresolve", path = ".." }

[build-dependencies]
napi-build = "2"
